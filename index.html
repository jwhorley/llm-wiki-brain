  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';

      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;

    const templateData = JSON.parse(templateEl.textContent);
    const pages = templateData.pages;
    const entryId = templateData.entry;
    const pageIds = Object.keys(pages);

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : {};

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {

            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;

            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }

    // window.__resources + the click interceptor into <head>. slice() rather

      // a blanket <base target="_parent"> would also redirect form submissions
      // and tear down the wrapper. Non-# links navigate the parent to the
      // anchor's resolved href; #/… routes forward to the parent's hash only
      // when the id is one of this bundle's own pages (author #/… links from
      // an in-page hash router are left to the scroll path so they don't yank
      // the user to the entry page); plain #frag scrolls in place.

      // anchors, which closest()/IDL .target get wrong.

            'if (h.charAt(0) !== "#") {' +

              'e.preventDefault();' +

              'return;' +
            '}' +
            'e.preventDefault();' +
            'if (h.slice(0, 2) === "#/") {' +
              'var c = h.indexOf(":", 2);' +
              'var pid = c < 0 ? h.slice(2) : h.slice(2, c);' +
              'try { pid = decodeURIComponent(pid); } catch(err) {}' +
              'if (window.__bundler_pages.indexOf(pid) >= 0) { parent.location.hash = h; return; }' +
            '}' +
            'var t = h.length > 1 ? document.getElementById(h.slice(1)) : null;' +
            'if (t) t.scrollIntoView({behavior:"smooth"});' +
            'else scrollTo({top:0, behavior:"smooth"});' +

      // ids) before wrapping — same escape level as every sibling JSON island.

        '</' + 'script>';

      // would push the parser into quirks mode. DOMParser always emits a <head>

      // attributes through, so match the full opening tag.

    }

    setStatus('Rendering...');

    if (pageIds.length === 1) {
      // Single page: the pre-crawl render path. Parse the template and swap the
      // root element. Scripts inserted via DOMParser/replaceWith are inert per

      for (const old of dead) {
        const s = document.createElement('script');
        for (const a of old.attributes) s.setAttribute(a.name, a.value);
        s.textContent = old.textContent;
        // text/babel scripts with a src: fetch and inline. transformScriptTags
        // does XHR against the src, but blob:null/ from a file:// origin is
        // silently dropped. Inlining makes it a plain inline babel script,
        // which transformScriptTags handles unconditionally.

          try {
            const r = await fetch(s.src);
            s.textContent = await r.text();
            s.removeAttribute('src');
          } catch (e) {}
        }
        // Non-executable script types (text/babel, application/json, …) are
        // data blocks per spec: the browser never fetches src and never fires
        // load/error, so awaiting would hang forever.
        const exec = !s.type || s.type === 'module' || /(java|ecma)script/i.test(s.type);
        const p = (s.src && exec) ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
        old.replaceWith(s);
        if (p) await p;
      }
      // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
      // which fired before we swapped the document. Trigger manually if present.
      if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
        window.Babel.transformScriptTags();
      }
      return;
    }

    // Multi-page: render into a full-viewport srcdoc iframe so each page runs
    // in its own realm while staying same-origin with the parent (so asset
    // blob URLs load and parent.location is writable).
    var frame = document.createElement('iframe');
    frame.id = '__bundler_frame';
    frame.setAttribute('style', 'position:fixed;inset:0;width:100%;height:100%;border:0;background:#fff');
    document.body.appendChild(frame);

    function decode(s) {
      try { return decodeURIComponent(s); } catch (e) { return s; }
    }
    function route() {
      var h = (location.hash || '');
      if (h.slice(0, 2) !== '#/') return { id: entryId, anchor: '' };
      h = h.slice(2);
      var i = h.indexOf(':');
      return i < 0 ? { id: decode(h), anchor: '' }
                   : { id: decode(h.slice(0, i)), anchor: decode(h.slice(i + 1)) };
    }

    var current = null;
    var navGen = 0;
    function navigate() {
      var r = route();
      var id = Object.prototype.hasOwnProperty.call(pages, r.id) ? r.id : entryId;
      if (current === id) {
        // Same-page anchor change: the iframe's own hash handles this, so
        // normally we don't reach here. If we do (e.g. a programmatic
        // parent.location.hash change), nudge the iframe.
        var cw = frame.contentWindow;
        if (!cw) return;
        var el = r.anchor && cw.document.getElementById(r.anchor);
        if (el) el.scrollIntoView({ behavior: 'smooth' });

      frame.onload = function() {

        // location.href=) re-fires onload with the same gen; after that the
        // iframe may be cross-origin, and cw.* access would throw.

        if (gen !== navGen) return;
        var cw = frame.contentWindow;
        try { cw.document.title && (document.title = cw.document.title); } catch (e) {}

                     document.getElementById('__bundler_placeholder');
        if (splash) splash.remove();
        if (loading) loading.remove();
        var el = r.anchor && cw.document.getElementById(r.anchor);
        if (el) el.scrollIntoView();
        else cw.scrollTo(0, 0);
      };
      frame.srcdoc = pages[id];
    }

    window.addEventListener('hashchange', navigate);
    navigate();
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }

ce Grotesk';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"3977f9e8-11a9-44fd-9e49-7bc4a039aaba\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Space Grotesk';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"54c77349-80ff-4bd8-a913-a6237602af9d\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n  <style>\n    :root {\n      --t-hero: 90px; --t-title: 68px; --t-sub: 44px;\n      --t-body: 36px; --t-small: 30px; --t-code: 26px; --t-badge: 24px;\n      --pad-x: 110px; --pad-top: 80px; --pad-bot: 80px;\n      --gap-title: 48px; --gap-item: 28px;\n      --col-bg: #F7F6F2; --col-surface: #FFFFFF;\n      --col-text: #12120D; --col-muted: #6A6A64; --col-rule: #E0DED8;\n      --col-blue: #6272BE; --col-blue-lt: #EEF0FA;\n      --col-green: #4B7826;\n      --col-demo: #0D1422; --col-activity: #0C1E0C;\n      --font-head: 'Space Grotesk', sans-serif;\n      --font-body: 'DM Sans', sans-serif;\n      --font-mono: 'JetBrains Mono', monospace;\n    }\n    *, *::before, *::after { box-sizing: border-box; }\n    body { margin: 0; background: #111; }\n  <\u002Fstyle>\n  <script src=\"85eac9af-a2f9-4e9d-aed9-86b7eb11a3a5\"><\u002Fscript>\n<\u002Fhelmet>\n\n<x-import component-from-global-scope=\"deck-stage\" width=\"1920\" height=\"1080\" hint-size=\"100%,100%\" data-uneditable=\"\">\n\n<!-- ===== SLIDE 01: TITLE ===== -->\n<section data-label=\"Title\" data-screen-label=\"01 — Title\" style=\"background:var(--col-bg);\" data-speaker-notes=\"Welcome everyone. This is a hands-on workshop — you'll leave with a working setup. The title is a riff on the 'This Is Your Brain on Drugs' PSA: your notes are the brain, Claude Code puts them on autopilot.\">\n  <div style=\"position:relative;width:100%;height:100%;display:flex;flex-direction:column;justify-content:center;padding:0 var(--pad-x);\">\n    <div style=\"position:absolute;inset:0;background-image:radial-gradient(circle,rgba(98,114,190,0.12) 1.5px,transparent 1.5px);background-size:36px 36px;pointer-events:none;\"><\u002Fdiv>\n    <canvas id=\"llm-graph-canvas\" style=\"position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;mask-image:linear-gradient(to right,transparent 36%,black 60%);-webkit-mask-image:linear-gradient(to right,transparent 36%,black 60%);\"><\u002Fcanvas>\n    <div style=\"font-family:var(--font-body);font-size:var(--t-badge);letter-spacing:3px;text-transform:uppercase;color:var(--col-muted);margin-bottom:36px;z-index:1;\">Workshop · Austin AI Alliance · June 2026<\u002Fdiv>\n    <div style=\"z-index:1;line-height:1.06;\">\n      <div style=\"font-family:var(--font-head);font-size:var(--t-hero);font-weight:300;color:var(--col-muted);\">This is Your<\u002Fdiv>\n      <div style=\"font-family:var(--font-head);font-size:var(--t-hero);font-weight:700;color:var(--col-blue);\">LLM Wiki Brain<\u002Fdiv>\n      <div style=\"font-family:var(--font-head);font-size:var(--t-hero);font-weight:700;color:var(--col-text);\">on Autopilot<\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"width:100px;height:4px;background:var(--col-blue);margin:52px 0 44px;z-index:1;\"><\u002Fdiv>\n    <div style=\"z-index:1;\">\n      <div style=\"font-family:var(--font-head);font-size:var(--t-small);font-weight:600;color:var(--col-text);\">J P. Whorley<\u002Fdiv>\n      <div style=\"font-family:var(--font-body);font-size:28px;color:var(--col-muted);margin-top:10px;\">Asst. Director Operations, Machine Learning Lab @ UT Austin<\u002Fdiv>\n    <\u002Fdiv>\n    <img src=\"974c5e7a-acc8-4a5e-aa9a-886612fde4ae\" style=\"position:absolute;top:28px;right:40px;height:82px;object-fit:contain;\" alt=\"Austin AI Alliance\">\n    <img src=\"fffc53f2-228b-4423-9d43-e0520f2f56ba\" style=\"position:absolute;bottom:32px;right:40px;height:46px;object-fit:contain;\" alt=\"NSF IFML\">\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ===== SLIDE 02: GAME PLAN ===== -->\n<section data-label=\"Game Plan\" data-screen-label=\"02 — Game Plan\" style=\"background:var(--col-surface);\" data-speaker-notes=\"75 minutes total. We move quickly through concepts, then spend the majority in demos and hands-on. Don't worry if you don't finish — materials will be posted.\">\n  <div style=\"position:relative;width:100%;height:100%;display:flex;flex-direction:column;padding:var(--pad-top) var(--pad-x) var(--pad-bot);\">\n    <h2 style=\"font-family:var(--font-head);font-size:var(--t-title);font-weight:700;color:var(--col-text);margin:0 0 var(--gap-title);\">Today's Game Plan<\u002Fh2>\n    <div style=\"display:flex;gap:28px;flex:1;align-items:stretch;\">\n      <div style=\"flex:1;background:var(--col-bg);border-radius:12px;padding:44px 36px;display:flex;flex-direction:column;gap:20px;\">\n        <div style=\"font-family:var(--font-head);font-size:var(--t-badge);letter-spacing:3px;text-transform:uppercase;color:var(--col-blue);\">Phase 01 · 15 min<\u002Fdiv>\n        <div style=\"font-family:var(--font-head);font-size:36px;font-weight:700;color:var(--col-text);\">Foundations<\u002Fdiv>\n        <div style=\"font-family:var(--font-body);font-size:var(--t-small);color:var(--col-muted);line-height:1.55;\">The LLM wiki-brain concept, Obsidian basics, and why this combination changes how you work.<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"flex:1;background:var(--col-bg);border-radius:12px;padding:44px 36px;display:flex;flex-direction:column;gap:20px;\">\n        <div style=\"font-family:var(--font-head);font-size:var(--t-badge);letter-spacing:3px;text-transform:uppercase;color:var(--col-blue);\">Phase 02 · 20 min<\u002Fdiv>\n        <div style=\"font-family:var(--font-head);font-size:36px;font-weight:700;color:var(--col-text);\">Setup + Live Demo<\u002Fdiv>\n        <div style=\"font-family:var(--font-body);font-size:var(--t-small);color:var(--col-muted);line-height:1.55;\">Get Claude Code connected to a vault, then four live demos showing what it can actually do.<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"flex:1;background:var(--col-bg);border-radius:12px;padding:44px 36px;display:flex;flex-direction:column;gap:20px;\">\n        <div style=\"font-family:var(--font-head);font-size:var(--t-badge);letter-spacing:3px;text-transform:uppercase;color:var(--col-green);\">Phase 03 · 25 min<\u002Fdiv>\n        <div style=\"font-family:var(--font-head);font-size:36px;font-weight:700;color:var(--col-text);\">Hands-On<\u002Fdiv>\n        <div style=\"font-family:var(--font-body);font-size:var(--t-small);color:var(--col-muted);line-height:1.55;\">You build it. Two guided activities: your first vault query and your first agent command.<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"flex:1;background:var(--col-bg);border-radius:12px;padding:44px 36px;display:flex;flex-direction:column;gap:20px;\">\n        <div style=\"font-family:var(--font-head);font-size:var(--t-badge);letter-spacing:3px;text-transform:uppercase;color:var(--col-muted);\">Phase 04 · 15 min<\u002Fdiv>\n        <div style=\"font-family:var(--font-head);font-size:36px;font-weight:700;color:var(--col-text);\">Advanced + Q&amp;A<\u002Fdiv>\n        <div style=\"font-family:var(--font-body);font-size:var(--t-small);color:var(--col-muted);line-height:1.55;\">Advanced workflows, where to take this next, and open discussion.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <img src=\"974c5e7a-acc8-4a5e-aa9a-886612fde4ae\" style=\"position:absolute;top:28px;right:40px;height:82px;object-fit:contain;\" alt=\"Austin AI Alliance\">\n    <img src=\"fffc53f2-228b-4423-9d43-e0520f2f56ba\" style=\"position:absolute;bottom:32px;right:40px;height:46px;object-fit:contain;\" alt=\"NSF IFML\">\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ===== SLIDE 03: THE PROBLEM ===== -->\n<section data-label=\"The Problem\" data-screen-label=\"03 — The Problem\" style=\"background:var(--col-bg);\" data-speaker-notes=\"Ask the room: how many of you have notes you haven't looked at in 6+ months? The problem isn't the tools — notes were never designed to be queried at scale.\">\n  <div style=\"position:relative;width:100%;height:100%;display:flex;flex-direction:column;padding:var(--pad-top) var(--pad-x) var(--pad-bot);\">\n    <h2 style=\"font-family:var(--font-head);font-size:var(--t-title);font-weight:700;color:var(--col-text);margin:0 0 var(--gap-title);\">Your Notes Are Rotting<\u002Fh2>\n    <div style=\"display:flex;gap:80px;flex:1;align-items:flex-start;\">\n      <div style=\"flex:1.1;\">\n        <div style=\"font-family:var(--font-head);font-size:54px;font-weight:700;color:var(--col-text);line-height:1.2;\">You write.<br>You file.<br>You forget.<\u002Fdiv>\n        <div style=\"font-family:var(--font-body);font-size:var(--t-body);color:var(--col-muted);line-height:1.65;margin-top:44px;\">The average knowledge worker captures thousands of notes over a career — and retrieves almost none of them. The problem isn't discipline. It's the missing layer between capture and use.<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"flex:1;display:flex;flex-direction:column;gap:36px;padding-top:8px;\">\n        <div style=\"display:flex;flex-direction:column;gap:12px;\">\n          <div style=\"font-family:var(--font-head);font-size:var(--t-sub);font-weight:700;color:var(--col-text);\">Capture trap<\u002Fdiv>\n          <div style=\"font-family:var(--font-body);font-size:var(--t-small);color:var(--col-muted);line-height:1.55;\">You're rewarded for writing things down, not for acting on them. The inbox grows. Nothing gets processed.<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"width:100%;height:1px;background:var(--col-rule);\"><\u002Fdiv>\n        <div style=\"display:flex;flex-direction:column;gap:12px;\">\n          <div style=\"font-family:var(--font-head);font-size:var(--t-sub);font-weight:700;color:var(--col-text);\">No connective tissue<\u002Fdiv>\n          <div style=\"font-family:var(--font-body);font-size:var(--t-small);color:var(--col-muted);line-height:1.55;\">Notes don't talk to each other. A 2021 idea and a 2024 project that should be linked — aren't.<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"width:100%;height:1px;background:var(--col-rule);\"><\u002Fdiv>\n        <div style=\"display:flex;flex-direction:column;gap:12px;\">\n          <div style=\"font-family:var(--font-head);font-size:var(--t-sub);font-weight:700;color:var(--col-text);\">Retrieval failure<\u002Fdiv>\n          <div style=\"font-family:var(--font-body);font-size:var(--t-small);color:var(--col-muted);line-height:1.55;\">You can't find what you know you wrote. Search fails you. Folders betray you. The insight is gone.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <img src=\"974c5e7a-acc8-4a5e-aa9a-886612fde4ae\" style=\"position:absolute;top:28px;right:40px;height:82px;object-fit:contain;\" alt=\"Austin AI Alliance\">\n    <img src=\"fffc53f2-228b-4423-9d43-e0520f2f56ba\" style=\"position:absolute;bottom:32px;right:40px;height:46px;object-fit:contain;\" alt=\"NSF IFML\">\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ===== SLIDE 04: LLM WIKI BRAIN ===== -->\n<section data-label=\"LLM Wiki Brain\" data-screen-label=\"04 — LLM Wiki Brain\" style=\"background:var(--col-surface);\" data-speaker-notes=\"The core insight: LLMs are Wikipedia on the inside. What if that wikipedia was YOUR notes? Claude Code is the bridge.\">\n  <div style=\"position:relative;width:100%;height:100%;display:flex;flex-direction:column;padding:var(--pad-top) var(--pad-x) var(--pad-bot);\">\n    <h2 style=\"font-family:var(--font-head);font-size:var(--t-title);font-weight:700;color:var(--col-text);margin:0 0 var(--gap-title);\">LLMs Know Wikipedia. What If They Knew <span style=\"color:var(--col-blue);\">You?<\u002Fspan><\u002Fh2>\n    <div style=\"display:flex;gap:0;flex:1;align-items:stretch;\">\n      <div style=\"flex:1;background:var(--col-bg);border-radius:12px 0 0 12px;padding:52px 48px;display:flex;flex-direction:column;gap:24px;\">\n        <div style=\"font-family:var(--font-head);font-size:var(--t-badge);letter-spacing:3px;text-transform:uppercase;color:var(--col-muted);\">The LLM Brain<\u002Fdiv>\n        <div style=\"font-family:var(--font-head);font-size:38px;font-weight:700;color:var(--col-text);\">Trained on the world<\u002Fdiv>\n        <div style=\"display:flex;flex-direction:column;gap:20px;margin-top:8px;\">\n          <div style=\"font-family:var(--font-body);font-size:var(--t-small);color:var(--col-muted);line-height:1.55;\">Wikipedia, books, the entire web<\u002Fdiv>\n          <div style=\"font-family:var(--font-body);font-size:var(--t-small);color:var(--col-muted);line-height:1.55;\">Knows everything about ML in general<\u002Fdiv>\n          <div style=\"font-family:var(--font-body);font-size:var(--t-small);color:var(--col-muted);line-height:1.55;\">Frozen at training cutoff — no updates<\u002Fdiv>\n          <div style=\"font-family:var(--font-body);font-size:var(--t-small);color:var(--col-muted);line-height:1.55;\">Has no idea who you are or how you think<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"width:4px;background:linear-gradient(to bottom,var(--col-blue),var(--col-green));flex:none;\"><\u002Fdiv>\n      <div style=\"flex:1;background:var(--col-blue-lt);border-radius:0 12px 12px 0;padding:52px 48px;display:flex;flex-direction:column;gap:24px;\">\n        <div style=\"font-family:var(--font-head);font-size:var(--t-badge);letter-spacing:3px;text-transform:uppercase;color:var(--col-blue);\">Your Wiki Brain<\u002Fdiv>\n        <div style=\"font-family:var(--font-head);font-size:38px;font-weight:700;color:var(--col-text);\">Trained on you<\u002Fdiv>\n        <div style=\"display:flex;flex-direction:column;gap:20px;margin-top:8px;\">\n          <div style=\"font-family:var(--font-body);font-size:var(--t-small);color:var(--col-text);line-height:1.55;\">Your daily notes, projects, ideas — in one vault<\u002Fdiv>\n          <div style=\"font-family:var(--font-body);font-size:var(--t-small);color:var(--col-text);line-height:1.55;\">Knows your specific context, language, patterns<\u002Fdiv>\n          <div style=\"font-family:var(--font-body);font-size:var(--t-small);color:var(--col-text);line-height:1.55;\">Updates every single time you write<\u002Fdiv>\n          <div style=\"font-family:var(--font-body);font-size:var(--t-small);color:var(--col-text);line-height:1.55;\">Claude Code can read and reason over ALL of it<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <img src=\"974c5e7a-acc8-4a5e-aa9a-886612fde4ae\" style=\"position:absolute;top:28px;right:40px;height:82px;object-fit:contain;\" alt=\"Austin AI Alliance\">\n    <img src=\"fffc53f2-228b-4423-9d43-e0520f2f56ba\" style=\"position:absolute;bottom:32px;right:40px;height:46px;object-fit:contain;\" alt=\"NSF IFML\">\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ===== SLIDE 05: THE STACK ===== -->\n<section data-label=\"The Stack\" data-screen-label=\"05 — The Stack\" style=\"background:var(--col-bg);\">\n  <div style=\"position:relative;width:100%;height:100%;display:flex;flex-direction:column;padding:var(--pad-top) var(--pad-x) var(--pad-bot);\">\n    <h2 style=\"font-family:var(--font-head);font-size:var(--t-title);font-weight:700;color:var(--col-text);margin:0 0 var(--gap-title);\">The Stack: Obsidian + Claude Code<\u002Fh2>\n    <div style=\"display:flex;gap:36px;flex:1;align-items:stretch;\">\n      <div style=\"flex:1;background:var(--col-surface);border-radius:12px;padding:48px 40px;display:flex;flex-direction:column;gap:20px;\">\n        <div style=\"display:flex;align-items:center;justify-content:space-between;gap:16px;\">\n          <div style=\"font-family:var(--font-head);font-size:var(--t-sub);font-weight:700;color:var(--col-text);\">Obsidian<\u002Fdiv>\n          <img src=\"0f86de10-2a19-4324-8f64-c35fb21ba955\" alt=\"obsidian\" style=\"height:64px;width:64px;object-fit:contain;flex:none;\">\n        <\u002Fdiv>\n        <div style=\"font-family:var(--font-head);font-size:var(--t-badge);letter-spacing:2px;text-transform:uppercase;color:var(--col-muted);\">Local knowledge vault<\u002Fdiv>\n        <div style=\"width:48px;height:3px;background:var(--col-blue);\"><\u002Fdiv>\n        <div style=\"display:flex;flex-direction:column;gap:18px;margin-top:4px;\">\n          <div style=\"font-family:var(--font-body);font-size:var(--t-small);color:var(--col-muted);line-height:1.5;\">Plain markdown files — yours forever, no lock-in<\u002Fdiv>\n          <div style=\"font-family:var(--font-body);font-size:var(--t-small);color:var(--col-muted);line-height:1.5;\">Interlinked notes via [[wiki-links]]<\u002Fdiv>\n          <div style=\"font-family:var(--font-body);font-size:var(--t-small);color:var(--col-muted);line-height:1.5;\">Graph view: visualize how ideas connect<\u002Fdiv>\n          <div style=\"font-family:var(--font-body);font-size:var(--t-small);color:var(--col-muted);line-height:1.5;\">Plugins: Dataview, Templater, Git, Calendar<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"flex:1;background:var(--col-surface);border-radius:12px;padding:48px 40px;display:flex;flex-direction:column;gap:20px;\">\n        <div style=\"display:flex;align-items:center;justify-content:space-between;gap:16px;\">\n          <div style=\"font-family:var(--font-head);font-size:var(--t-sub);font-weight:700;color:var(--col-text);\">Claude Code<\u002Fdiv>\n          <img src=\"2a608433-a9d3-4a7b-a2ce-f3fc6884cd35\" alt=\"claude-ai\" style=\"height:64px;width:64px;object-fit:contain;flex:none;\">\n        <\u002Fdiv>\n        <div style=\"font-family:var(--font-head);font-size:var(--t-badge);letter-spacing:2px;text-transform:uppercase;color:var(--col-muted);\">AI thinking partner<\u002Fdiv>\n        <div style=\"width:48px;height:3px;background:var(--col-blue);\"><\u002Fdiv>\n        <div style=\"display:flex;flex-direction:column;gap:18px;margin-top:4px;\">\n          <div style=\"font-family:var(--font-body);font-size:var(--t-small);color:var(--col-muted);line-height:1.5;\">Runs in your terminal, reads local files directly<\u002Fdiv>\n          <div style=\"font-family:var(--font-body);font-size:var(--t-small);color:var(--col-muted);line-height:1.5;\">Traverses your entire vault in one context window<\u002Fdiv>\n          <div style=\"font-family:var(--font-body);font-size:var(--t-small);color:var(--col-muted);line-height:1.5;\">Reads, writes, edits, and reorganizes markdown<\u002Fdiv>\n          <div style=\"font-family:var(--font-body);font-size:var(--t-small);color:var(--col-muted);line-height:1.5;\">Executes custom commands and agents autonomously<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"flex:1;background:var(--col-blue);border-radius:12px;padding:48px 40px;display:flex;flex-direction:column;gap:20px;\">\n        <div style=\"font-family:var(--font-head);font-size:var(--t-sub);font-weight:700;color:#fff;\">Together<\u002Fdiv>\n        <div style=\"font-family:var(--font-head);font-size:var(--t-badge);letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,0.6);\">Personal operating system<\u002Fdiv>\n        <div style=\"width:48px;height:3px;background:rgba(255,255,255,0.35);\"><\u002Fdiv>\n        <div style=\"display:flex;flex-direction:column;gap:18px;margin-top:4px;\">\n          <div style=\"font-family:var(--font-body);font-size:var(--t-small);color:rgba(255,255,255,0.85);line-height:1.5;\">Ask questions across years of writing<\u002Fdiv>\n          <div style=\"font-family:var(--font-body);font-size:var(--t-small);color:rgba(255,255,255,0.85);line-height:1.5;\">Surface patterns you never noticed<\u002Fdiv>\n          <div style=\"font-family:var(--font-body);font-size:var(--t-small);color:rgba(255,255,255,0.85);line-height:1.5;\">Generate ideas grounded in your context<\u002Fdiv>\n          <div style=\"font-family:var(--font-body);font-size:var(--t-small);color:rgba(255,255,255,0.85);line-height:1.5;\">Delegate tasks to autonomous agents<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <img src=\"974c5e7a-acc8-4a5e-aa9a-886612fde4ae\" style=\"position:absolute;top:28px;right:40px;height:82px;object-fit:contain;\" alt=\"Austin AI Alliance\">\n    <img src=\"fffc53f2-228b-4423-9d43-e0520f2f56ba\" style=\"position:absolute;bottom:32px;right:40px;height:46px;object-fit:contain;\" alt=\"NSF IFML\">\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ===== SLIDE 06: HOW IT WORKS ===== -->\n<section data-label=\"How It Works\" data-screen-label=\"06 — How It Works\" style=\"background:var(--col-surface);\">\n  <div style=\"position:relative;width:100%;height:100%;display:flex;flex-direction:column;justify-content:center;padding:0 var(--pad-x);\">\n    <h2 style=\"font-family:var(--font-head);font-size:var(--t-title);font-weight:700;color:var(--col-text);margin:0 0 var(--gap-title);\">How It Works<\u002Fh2>\n    <div style=\"display:flex;align-items:center;gap:0;\">\n      <div style=\"flex:1;background:var(--col-bg);border-radius:12px;padding:52px 44px;display:flex;flex-direction:column;gap:20px;\">\n        <div style=\"font-family:var(--font-head);font-size:var(--t-badge);letter-spacing:3px;text-transform:uppercase;color:var(--col-muted);\">Step 01<\u002Fdiv>\n        <div style=\"font-family:var(--font-head);font-size:var(--t-sub);font-weight:700;color:var(--col-text);\">Write<\u002Fdiv>\n        <div style=\"font-family:var(--font-body);font-size:var(--t-small);color:var(--col-muted);line-height:1.55;\">Take notes naturally in Obsidian. Daily notes, project logs, ideas, links. Write for yourself — don't optimize for machines.<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"flex:none;padding:0 32px;font-size:52px;color:var(--col-rule);font-family:var(--font-head);font-weight:300;\">→<\u002Fdiv>\n      <div style=\"flex:1;background:var(--col-bg);border-radius:12px;padding:52px 44px;display:flex;flex-direction:column;gap:20px;\">\n        <div style=\"font-family:var(--font-head);font-size:var(--t-badge);letter-spacing:3px;text-transform:uppercase;color:var(--col-blue);\">Step 02<\u002Fdiv>\n        <div style=\"font-family:var(--font-head);font-size:var(--t-sub);font-weight:700;color:var(--col-text);\">Load<\u002Fdiv>\n        <div style=\"font-family:var(--font-body);font-size:var(--t-small);color:var(--col-muted);line-height:1.55;\">Open Claude Code in your terminal and point it at your vault. It reads every markdown file and builds context across your entire knowledge base.<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"flex:none;padding:0 32px;font-size:52px;color:var(--col-rule);font-family:var(--font-head);font-weight:300;\">→<\u002Fdiv>\n      <div style=\"flex:1;background:var(--col-blue-lt);border-radius:12px;padding:52px 44px;display:flex;flex-direction:column;gap:20px;border:2px solid var(--col-blue);\">\n        <div style=\"font-family:var(--font-head);font-size:var(--t-badge);letter-spacing:3px;text-transform:uppercase;color:var(--col-blue);\">Step 03<\u002Fdiv>\n        <div style=\"font-family:var(--font-head);font-size:var(--t-sub);font-weight:700;color:var(--col-text);\">Use<\u002Fdiv>\n        <div style=\"font-family:var(--font-body);font-size:var(--t-small);color:var(--col-muted);line-height:1.55;\">Ask questions, find patterns, generate ideas, delegate tasks. Years of writing become instantly queryable intelligence.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <img src=\"974c5e7a-acc8-4a5e-aa9a-886612fde4ae\" style=\"position:absolute;top:28px;right:40px;height:82px;object-fit:contain;\" alt=\"Austin AI Alliance\">\n    <img src=\"fffc53f2-228b-4423-9d43-e0520f2f56ba\" style=\"position:absolute;bottom:32px;right:40px;height:46px;object-fit:contain;\" alt=\"NSF IFML\">\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ===== SLIDE 07: OBSIDIAN SETUP ===== -->\n<section data-label=\"Obsidian Setup\" data-screen-label=\"07 — Obsidian Setup\" style=\"background:var(--col-bg);\" data-speaker-notes=\"Walk through your own vault structure here. PARA (Projects/Areas/Resources/Archive) is a great starting point. The key habit: daily notes as a consistent practice is the foundation everything else builds on.\">\n  <div style=\"position:relative;width:100%;height:100%;display:flex;flex-direction:column;padding:var(--pad-top) var(--pad-x) var(--pad-bot);\">\n    <h2 style=\"font-family:var(--font-head);font-size:var(--t-title);font-weight:700;color:var(--col-text);margin:0 0 var(--gap-title);\">Setting Up Obsidian<\u002Fh2>\n    <div style=\"display:flex;gap:64px;flex:1;align-items:flex-start;\">\n      <div style=\"flex:1.1;\">\n        <div style=\"font-family:var(--font-head);font-size:var(--t-sub);font-weight:600;color:var(--col-text);margin-bottom:24px;\">Recommended Vault Structure<\u002Fdiv>\n        <div style=\"background:#1E2030;border-radius:12px;padding:36px 40px;font-family:var(--font-mono);font-size:var(--t-code);color:#CDD6F4;line-height:2.1;\">\n          <div style=\"color:#89B4FA;\">📁 Vault/<\u002Fdiv>\n          <div style=\"margin-left:28px;\">├── <span style=\"color:#A6E3A1;\">wiki/<\u002Fspan>               <span style=\"color:#6C7086;\"># Agent writes everything here<\u002Fspan><\u002Fdiv>\n          <div style=\"margin-left:56px;\">├── <span style=\"color:#CDD6F4;\">index.md<\u002Fspan>            <span style=\"color:#6C7086;\"># table of contents<\u002Fspan><\u002Fdiv>\n          <div style=\"margin-left:56px;\">└── <span style=\"color:#CDD6F4;\">log.md<\u002Fspan>              <span style=\"color:#6C7086;\"># operations history<\u002Fspan><\u002Fdiv>\n          <div style=\"margin-left:28px;\">├── <span style=\"color:#A6E3A1;\">raw/<\u002Fspan>                <span style=\"color:#6C7086;\"># drop new content here for the Agent<\u002Fspan><\u002Fdiv>\n          <div style=\"margin-left:28px;\">└── <span style=\"color:#F38BA8;\">*Claude.md<\u002Fspan>          <span style=\"color:#6C7086;\"># rules / schema<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"flex:1;display:flex;flex-direction:column;gap:28px;\">\n        <div style=\"font-family:var(--font-head);font-size:var(--t-sub);font-weight:600;color:var(--col-text);margin-bottom:4px;\">Essential Plugins<\u002Fdiv>\n        <div style=\"display:flex;flex-direction:column;gap:20px;\">\n          <div style=\"display:flex;gap:20px;align-items:center;\">\n            <div style=\"background:var(--col-blue);color:#fff;font-family:var(--font-mono);font-size:var(--t-badge);padding:6px 16px;border-radius:6px;flex:none;\">Lean Terminal<\u002Fdiv>\n            <div style=\"font-family:var(--font-body);font-size:var(--t-small);color:var(--col-muted);line-height:1.5;\">Simple .zsh within Obsidian<\u002Fdiv>\n          <\u002Fdiv><div style=\"display:flex;gap:20px;align-items:center;\">\n            <div style=\"color: #fff; font-family: var(--font-mono); font-size: var(--t-badge); padding: 6px 16px; border-radius: 6px; flex: none; background-color: #868890\">Optional Community Plugins to check out<\u002Fdiv>\n            \n          <\u002Fdiv>\n          <div style=\"display:flex;gap:20px;align-items:center;\">\n            <div style=\"background:var(--col-blue);color:#fff;font-family:var(--font-mono);font-size:var(--t-badge);padding:6px 16px;border-radius:6px;flex:none;\">Dataview<\u002Fdiv>\n            <div style=\"font-family:var(--font-body);font-size:var(--t-small);color:var(--col-muted);line-height:1.5;\">Query your notes like a database with SQL-like syntax<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"display:flex;gap:20px;align-items:center;\">\n            <div style=\"background:var(--col-blue);color:#fff;font-family:var(--font-mono);font-size:var(--t-badge);padding:6px 16px;border-radius:6px;flex:none;\">Git<\u002Fdiv>\n            <div style=\"font-family:var(--font-body);font-size:var(--t-small);color:var(--col-muted);line-height:1.5;\">Version control — track how your thinking evolves over time<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"display:flex;gap:20px;align-items:center;\">\n            <div style=\"background:var(--col-blue);color:#fff;font-family:var(--font-mono);font-size:var(--t-badge);padding:6px 16px;border-radius:6px;flex:none;\">Calendar<\u002Fdiv>\n            <div style=\"font-family:var(--font-body);font-size:var(--t-small);color:var(--col-muted);line-height:1.5;\">Visualize daily notes as a heat-map over time<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <img src=\"974c5e7a-acc8-4a5e-aa9a-886612fde4ae\" style=\"position:absolute;top:28px;right:40px;height:82px;object-fit:contain;\" alt=\"Austin AI Alliance\">\n    <img src=\"fffc53f2-228b-4423-9d43-e0520f2f56ba\" style=\"position:absolute;bottom:32px;right:40px;height:46px;object-fit:contain;\" alt=\"NSF IFML\">\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ===== SLIDE 08: CLAUDE CODE SETUP ===== -->\n<section data-label=\"Claude Code Setup\" data-screen-label=\"08 — Claude Code Setup\" style=\"background:var(--col-surface);\" data-speaker-notes=\"Do this live. Show the install, navigate to your vault, prime Claude with the 'read all files' prompt. This is the magic moment where it all clicks for the audience.\">\n  <div style=\"position:relative;width:100%;height:100%;display:flex;flex-direction:column;padding:var(--pad-top) var(--pad-x) var(--pad-bot);\">\n    <h2 style=\"font-family:var(--font-head);font-size:var(--t-title);font-weight:700;color:var(--col-text);margin:0 0 var(--gap-title);\">Connecting Claude Code to Your Vault<\u002Fh2>\n    <div style=\"display:flex;gap:60px;flex:1;align-items:flex-start;\">\n      <div style=\"flex:1.1;display:flex;flex-direction:column;gap:28px;\">\n        <div>\n          <div style=\"font-family:var(--font-head);font-size:var(--t-badge);letter-spacing:3px;text-transform:uppercase;color:var(--col-blue);margin-bottom:16px;\">1 — Install<\u002Fdiv>\n          <div style=\"background:#1E2030;border-radius:10px;padding:22px 32px;font-family:var(--font-mono);font-size:var(--t-code);color:#CDD6F4;\"><span style=\"color:#89B4FA;\">$<\u002Fspan> npm install -g @anthropic-ai/claude-code<\u002Fdiv>\n        <\u002Fdiv>\n        <div>\n          <div style=\"font-family:var(--font-head);font-size:var(--t-badge);letter-spacing:3px;text-transform:uppercase;color:var(--col-blue);margin-bottom:16px;\">2 — Navigate to your vault<\u002Fdiv>\n          <div style=\"background:#1E2030;border-radius:10px;padding:22px 32px;font-family:var(--font-mono);font-size:var(--t-code);color:#CDD6F4;line-height:1.9;\">\n            <div><span style=\"color:#89B4FA;\">$<\u002Fspan> cd ~/Obsidian/MyVault<\u002Fdiv>\n            <div><span style=\"color:#89B4FA;\">$<\u002Fspan> claude<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div>\n          <div style=\"font-family:var(--font-head);font-size:var(--t-badge);letter-spacing:3px;text-transform:uppercase;color:var(--col-blue);margin-bottom:12px;\">3 — Enable Obsidian URI (Settings → General → Advanced)<\u002Fdiv>\n          <div style=\"background:#1E2030;border-radius:10px;padding:16px 32px;font-family:var(--font-mono);font-size:var(--t-code);color:#CDD6F4;line-height:1.9;\">\n            <div><span style=\"color:#A6E3A1;\">☑<\u002Fspan> Enable Obsidian URI  <span style=\"color:#6C7086;\"># obsidian.md/cli — one toggle, no install<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div>\n          \n          \n        <\u002Fdiv>\n        <div>\n          <div style=\"font-family:var(--font-head);font-size:var(--t-badge);letter-spacing:3px;text-transform:uppercase;color:var(--col-blue);margin-bottom:12px;\">4 — PRIME THE CONTEXT<\u002Fdiv>\n          <div style=\"background:#1E2030;border-radius:10px;padding:16px 32px;font-family:var(--font-mono);font-size:var(--t-code);color:#CDD6F4;line-height:1.9;\">\n            <div><span style=\"color:#A6E3A1;\">›<\u002Fspan> Build a model of my knowledge base.<\u002Fdiv>\n            <div><span style=\"color:#A6E3A1;\">›<\u002Fspan> Write the schema for your second brain - don't let the \"blank slate\" intimidate you!<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"flex:1;background:var(--col-bg);border-radius:12px;padding:44px 40px;display:flex;flex-direction:column;gap:24px;\">\n        <div style=\"font-family:var(--font-head);font-size:var(--t-sub);font-weight:600;color:var(--col-text);\">What Claude reads<\u002Fdiv>\n        <div style=\"display:flex;flex-direction:column;gap:20px;\">\n          <div style=\"font-family:var(--font-body);font-size:var(--t-small);color:var(--col-muted);line-height:1.55;\">Every .md file — years of writing loaded into a single conversation context<\u002Fdiv>\n          <div style=\"font-family:var(--font-body);font-size:var(--t-small);color:var(--col-muted);line-height:1.55;\">YAML frontmatter — dates, tags, and metadata become queryable attributes<\u002Fdiv>\n          <div style=\"font-family:var(--font-body);font-size:var(--t-small);color:var(--col-muted);line-height:1.55;\">[[Wiki-links]] — Claude understands your note connections as a knowledge graph<\u002Fdiv>\n          <div style=\"font-family:var(--font-body);font-size:var(--t-small);color:var(--col-muted);line-height:1.55;\">Folder structure — context about how you organize different kinds of knowledge<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"background:var(--col-blue);border-radius:8px;padding:20px 24px;margin-top:8px;\">\n          <div style=\"font-family:var(--font-body);font-size:var(--t-small);color:#fff;line-height:1.6;\"><strong>Tip:<\u002Fstrong> The <span style=\"font-family:var(--font-mono);background:rgba(255,255,255,0.2);padding:2px 8px;border-radius:4px;font-size:var(--t-badge);\">--dangerously-skip-permissions<\u002Fspan> flag lets Claude work autonomously without prompting for each file operation.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <img src=\"974c5e7a-acc8-4a5e-aa9a-886612fde4ae\" style=\"position:absolute;top:28px;right:40px;height:82px;object-fit:contain;\" alt=\"Austin AI Alliance\">\n    <img src=\"fffc53f2-228b-4423-9d43-e0520f2f56ba\" style=\"position:absolute;bottom:32px;right:40px;height:46px;object-fit:contain;\" alt=\"NSF IFML\">\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ===== SLIDE 09: YOUR wiki COMMAND ===== -->\n<section data-label=\"wiki Command\" data-screen-label=\"09 — wiki Command\" style=\"background:var(--col-surface);\" data-speaker-notes=\"This is your launch pad. Once wiki is set up, typing 'wiki' drops you directly into a Claude Code session inside your vault — no navigating, no thinking. Show it live here.\">\n  <div style=\"position:relative;width:100%;height:100%;display:flex;flex-direction:column;padding:var(--pad-top) var(--pad-x) var(--pad-bot);\">\n    <h2 style=\"font-family:var(--font-head);font-size:var(--t-title);font-weight:700;color:var(--col-text);margin:0 0 var(--gap-title);\">Your <span style=\"font-family:'JetBrains Mono',monospace;color:var(--col-green);\">wiki<\u002Fspan> Command<\u002Fh2>\n    <div style=\"display:flex;gap:60px;flex:1;align-items:flex-start;\">\n      <div style=\"flex:1.2;display:flex;flex-direction:column;gap:32px;\">\n        <div>\n          <div style=\"font-family:var(--font-head);font-size:var(--t-badge);letter-spacing:3px;text-transform:uppercase;color:var(--col-muted);margin-bottom:16px;\">macOS — add to ~/.zshrc<\u002Fdiv>\n          <div style=\"background:#1E2030;border-radius:10px;padding:28px 36px;font-family:'JetBrains Mono',monospace;font-size:var(--t-code);color:#CDD6F4;line-height:1.9;\">\n            <div><span style=\"color:#6C7086;\"># paste this line into ~/.zshrc<\u002Fspan><\u002Fdiv>\n            <div>alias wiki='cd \"{path_to_your_vault}\" &amp;&amp; claude'<\u002Fdiv>\n            <div style=\"margin-top:8px;\"><span style=\"color:#89B4FA;\">$<\u002Fspan> source ~/.zshrc<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div>\n          <div style=\"font-family:var(--font-head);font-size:var(--t-badge);letter-spacing:3px;text-transform:uppercase;color:var(--col-muted);margin-bottom:16px;\">Windows — add to $PROFILE (PowerShell)<\u002Fdiv>\n          <div style=\"background:#1E2030;border-radius:10px;padding:28px 36px;font-family:'JetBrains Mono',monospace;font-size:var(--t-code);color:#CDD6F4;line-height:1.9;\">\n            <div><span style=\"color:#6C7086;\"># paste into $PROFILE (notepad $PROFILE)<\u002Fspan><\u002Fdiv>\n            <div>function wiki { Set-Location \"{path_to_your_vault}\"; claude }<\u002Fdiv>\n            <div style=\"margin-top:8px;\"><span style=\"color:#89B4FA;\">PS&gt;<\u002Fspan> . $PROFILE<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"flex:1;background:var(--col-bg);border-radius:12px;padding:44px 40px;display:flex;flex-direction:column;gap:24px;\">\n        <div style=\"font-family:var(--font-head);font-size:var(--t-sub);font-weight:600;color:var(--col-text);\">What wiki does<\u002Fdiv>\n        <div style=\"display:flex;flex-direction:column;gap:20px;\">\n          <div style=\"font-family:var(--font-body);font-size:var(--t-small);color:var(--col-muted);line-height:1.55;\">One word launches a full Claude Code session inside your vault — no path navigation, no setup<\u002Fdiv>\n          <div style=\"font-family:var(--font-body);font-size:var(--t-small);color:var(--col-muted);line-height:1.55;\">Replace <span style=\"font-family:'JetBrains Mono',monospace;background:var(--col-rule);padding:2px 8px;border-radius:4px;\">{path_to_your_vault}<\u002Fspan> with your actual vault path, e.g. <span style=\"font-family:'JetBrains Mono',monospace;font-size:24px;\">~/Obsidian/MyVault<\u002Fspan><\u002Fdiv>\n          <div style=\"font-family:var(--font-body);font-size:var(--t-small);color:var(--col-muted);line-height:1.55;\">Works from any directory — type <span style=\"font-family:'JetBrains Mono',monospace;background:var(--col-rule);padding:2px 8px;border-radius:4px;\">wiki<\u002Fspan> anywhere in your terminal<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"background:var(--col-green);border-radius:8px;padding:20px 24px;margin-top:8px;\">\n          <div style=\"font-family:var(--font-body);font-size:var(--t-small);color:#fff;line-height:1.6;\"><strong>Demo:<\u002Fstrong> Type <span style=\"font-family:'JetBrains Mono',monospace;background:rgba(0,0,0,0.2);padding:2px 8px;border-radius:4px;\">wiki<\u002Fspan> in terminal now — you're in your second brain in one keystroke.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <img src=\"974c5e7a-acc8-4a5e-aa9a-886612fde4ae\" style=\"position:absolute;top:28px;right:40px;height:82px;object-fit:contain;\" alt=\"Austin AI Alliance\">\n    <img src=\"fffc53f2-228b-4423-9d43-e0520f2f56ba\" style=\"position:absolute;bottom:32px;right:40px;height:46px;object-fit:contain;\" alt=\"NSF IFML\">\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ===== SLIDE 10: DEMO 1 ===== -->\n<section data-label=\"Demo 1\" data-screen-label=\"09 — Demo 1\" style=\"background:var(--col-demo);\" data-speaker-notes=\"Switch to terminal. Run these prompts against your real vault. Let the audience see Claude referencing actual file names and dates. The speed is usually the first 'wow' moment.\">\n  <div style=\"position:relative;width:100%;height:100%;display:flex;flex-direction:column;padding:var(--pad-top) var(--pad-x) var(--pad-bot);\">\n    <div style=\"display:flex;align-items:center;gap:24px;margin-bottom:var(--gap-title);\">\n      <div style=\"background:var(--col-blue);font-family:var(--font-head);font-size:var(--t-badge);letter-spacing:3px;text-transform:uppercase;color:#fff;padding:8px 20px;border-radius:6px;\">Demo 01<\u002Fdiv>\n      <h2 style=\"font-family:var(--font-head);font-size:var(--t-title);font-weight:700;color:#fff;margin:0;\">Basic Vault Queries<\u002Fh2>\n    <\u002Fdiv>\n    <div style=\"display:flex;gap:64px;flex:1;align-items:flex-start;\">\n      <div style=\"flex:1.2;display:flex;flex-direction:column;gap:28px;\">\n        <div style=\"font-family:var(--font-head);font-size:var(--t-badge);letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,0.45);\">Example prompts<\u002Fdiv>\n        <div style=\"background:#1A2540;border-radius:12px;padding:36px 40px;font-family:var(--font-mono);font-size:var(--t-code);color:#CDD6F4;display:flex;flex-direction:column;gap:22px;line-height:1.7;\">\n          <div><span style=\"color:#A6E3A1;\">›<\u002Fspan> What do I know about machine learning?<\u002Fdiv>\n          <div><span style=\"color:#A6E3A1;\">›<\u002Fspan> Summarize my notes from the past 3 months.<\u002Fdiv>\n          <div><span style=\"color:#A6E3A1;\">›<\u002Fspan> What projects am I actively working on?<\u002Fdiv>\n          <div><span style=\"color:#A6E3A1;\">›<\u002Fspan> Find all notes tagged #idea and summarize them.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"flex:1;display:flex;flex-direction:column;gap:28px;\">\n        <div style=\"font-family:var(--font-head);font-size:var(--t-badge);letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,0.45);\">What to watch for<\u002Fdiv>\n        <div style=\"display:flex;flex-direction:column;gap:28px;\">\n          <div style=\"display:flex;gap:20px;align-items:flex-start;\">\n            <div style=\"width:8px;height:8px;background:var(--col-blue);border-radius:50%;flex:none;margin-top:14px;\"><\u002Fdiv>\n            <div style=\"font-family:var(--font-body);font-size:var(--t-small);color:rgba(255,255,255,0.75);line-height:1.55;\">Claude references actual file names and dates — it's reading your files, not hallucinating<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"display:flex;gap:20px;align-items:flex-start;\">\n            <div style=\"width:8px;height:8px;background:var(--col-blue);border-radius:50%;flex:none;margin-top:14px;\"><\u002Fdiv>\n            <div style=\"font-family:var(--font-body);font-size:var(--t-small);color:rgba(255,255,255,0.75);line-height:1.55;\">It synthesizes across files — patterns that span multiple notes and years<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"display:flex;gap:20px;align-items:flex-start;\">\n            <div style=\"width:8px;height:8px;background:var(--col-blue);border-radius:50%;flex:none;margin-top:14px;\"><\u002Fdiv>\n            <div style=\"font-family:var(--font-body);font-size:var(--t-small);color:rgba(255,255,255,0.75);line-height:1.55;\">Speed — a query that would take hours of manual search runs in seconds<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <img src=\"974c5e7a-acc8-4a5e-aa9a-886612fde4ae\" style=\"position:absolute;top:28px;right:40px;height:82px;object-fit:contain;\" alt=\"Austin AI Alliance\">\n    <img src=\"fffc53f2-228b-4423-9d43-e0520f2f56ba\" style=\"position:absolute;bottom:32px;right:40px;height:46px;object-fit:contain;\" alt=\"NSF IFML\">\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ===== SLIDE 10: ACTIVITY 1 ===== -->\n<section data-label=\"Activity 1\" data-screen-label=\"10 — Activity 1\" style=\"background:var(--col-activity);\" data-speaker-notes=\"Give them 7 minutes. Walk the room. Help people stuck on install — pair them with someone who has a vault. The right box is for people starting from zero today.\">\n  <div style=\"position:relative;width:100%;height:100%;display:flex;flex-direction:column;padding:var(--pad-top) var(--pad-x) var(--pad-bot);\">\n    <div style=\"display:flex;align-items:center;gap:24px;margin-bottom:var(--gap-title);\">\n      <div style=\"background:var(--col-green);font-family:var(--font-head);font-size:var(--t-badge);letter-spacing:3px;text-transform:uppercase;color:#fff;padding:8px 20px;border-radius:6px;\">Activity · 7 min<\u002Fdiv>\n      <h2 style=\"font-family:var(--font-head);font-size:var(--t-title);font-weight:700;color:#fff;margin:0;\">Try It: Your First Vault Query<\u002Fh2>\n    <\u002Fdiv>\n    <div style=\"display:flex;gap:64px;flex:1;min-height:0;align-items:flex-start;\">\n      <div style=\"flex:1;display:flex;flex-direction:column;gap:24px;\">\n        <div style=\"display:flex;gap:24px;align-items:flex-start;\">\n          <div style=\"font-family:var(--font-head);font-size:38px;font-weight:700;color:var(--col-green);flex:none;width:52px;\">1<\u002Fdiv>\n          <div style=\"font-family:var(--font-body);font-size:var(--t-body);color:rgba(255,255,255,0.85);line-height:1.5;padding-top:4px;\">Open terminal and navigate to your Obsidian vault folder<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:flex;gap:24px;align-items:flex-start;\">\n          <div style=\"font-family:var(--font-head);font-size:38px;font-weight:700;color:var(--col-green);flex:none;width:52px;\">2<\u002Fdiv>\n          <div style=\"font-family:var(--font-body);font-size:var(--t-body);color:rgba(255,255,255,0.85);line-height:1.5;padding-top:4px;\">Run <span style=\"font-family:var(--font-mono);background:rgba(255,255,255,0.12);padding:2px 12px;border-radius:4px;\">claude<\u002Fspan> to start a session<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:flex;gap:24px;align-items:flex-start;\">\n          <div style=\"font-family:var(--font-head);font-size:38px;font-weight:700;color:var(--col-green);flex:none;width:52px;\">3<\u002Fdiv>\n          <div style=\"font-family:var(--font-body);font-size:var(--t-body);color:rgba(255,255,255,0.85);line-height:1.5;padding-top:4px;\">Ask: <span style=\"color:#A6E3A1;\">\"Summarize everything I know about [pick a topic you write about]\"<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:flex;gap:24px;align-items:flex-start;\">\n          <div style=\"font-family:var(--font-head);font-size:38px;font-weight:700;color:var(--col-green);flex:none;width:52px;\">4<\u002Fdiv>\n          <div style=\"font-family:var(--font-body);font-size:var(--t-body);color:rgba(255,255,255,0.85);line-height:1.5;padding-top:4px;\">Notice what it surfaces. What surprised you?<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"flex:1;background:rgba(255,255,255,0.05);border-radius:12px;padding:44px 40px;border:1px solid rgba(255,255,255,0.1);\">\n        <div style=\"font-family:var(--font-head);font-size:var(--t-sub);font-weight:600;color:#fff;margin-bottom:24px;\">If you don't have a vault yet<\u002Fdiv>\n        <div style=\"display:flex;flex-direction:column;gap:20px;\">\n          <div style=\"font-family:var(--font-body);font-size:var(--t-small);color:rgba(255,255,255,0.7);line-height:1.55;\">Download Obsidian free at obsidian.md<\u002Fdiv>\n          <div style=\"font-family:var(--font-body);font-size:var(--t-small);color:rgba(255,255,255,0.7);line-height:1.55;\">Create a vault and write 3–5 notes on topics you know well<\u002Fdiv>\n          <div style=\"font-family:var(--font-body);font-size:var(--t-small);color:rgba(255,255,255,0.7);line-height:1.55;\">Even 5 notes reveals something interesting when queried<\u002Fdiv>\n          <div style=\"font-family:var(--font-body);font-size:var(--t-small);color:rgba(255,255,255,0.45);margin-top:8px;\">— or pair with a neighbor who has a vault<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"flex:none;margin-top:24px;background:rgba(255,255,255,0.06);border-radius:12px;border:1px solid rgba(255,255,255,0.1);padding:24px 36px;\">\n      <div style=\"font-family:var(--font-head);font-size:var(--t-badge);letter-spacing:3px;text-transform:uppercase;color:rgba(255,255,255,0.4);margin-bottom:18px;\">Add velocity to your Vault<\u002Fdiv>\n      <div style=\"display:flex;gap:40px;align-items:center;\">\n        <div style=\"display:flex;align-items:center;gap:20px;flex:1;\">\n          <img src=\"1960cf8b-0219-4cf3-be2d-49e07770ade3\" alt=\"NotebookLM\" style=\"height:44px;object-fit:contain;filter:brightness(0) invert(1);flex:none;\">\n          <div style=\"font-family:var(--font-body);font-size:var(--t-small);color:rgba(255,255,255,0.65);line-height:1.45;\">Summarize a YouTube video → paste the output into your vault as a new note<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"width:1px;height:52px;background:rgba(255,255,255,0.12);flex:none;\"><\u002Fdiv>\n        <div style=\"display:flex;align-items:center;gap:20px;flex:1;\">\n          <div style=\"background:#7B5EA7;color:#fff;font-family:var(--font-head);font-size:var(--t-small);font-weight:700;padding:10px 20px;border-radius:8px;flex:none;white-space:nowrap;\">Web Clipper<\u002Fdiv>\n          <div style=\"font-family:var(--font-body);font-size:var(--t-small);color:rgba(255,255,255,0.65);line-height:1.45;\">Clip any webpage directly into your vault — one click, ready to query<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <img src=\"974c5e7a-acc8-4a5e-aa9a-886612fde4ae\" style=\"position:absolute;top:28px;right:40px;height:82px;object-fit:contain;\" alt=\"Austin AI Alliance\">\n    <img src=\"fffc53f2-228b-4423-9d43-e0520f2f56ba\" style=\"position:absolute;bottom:32px;right:40px;height:46px;object-fit:contain;\" alt=\"NSF IFML\">\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ===== SLIDE 11: DEMO 2 ===== -->\n<section data-label=\"Demo 2\" data-screen-label=\"11 — Demo 2\" style=\"background:var(--col-demo);\" data-speaker-notes=\"This is often the most surprising demo. Ask Claude what you've been 'obsessed with but haven't acted on' — the answer is usually uncomfortably accurate. Let that land with the audience.\">\n  <div style=\"position:relative;width:100%;height:100%;display:flex;flex-direction:column;padding:var(--pad-top) var(--pad-x) var(--pad-bot);\">\n    <div style=\"display:flex;align-items:center;gap:24px;margin-bottom:var(--gap-title);\">\n      <div style=\"background:var(--col-blue);font-family:var(--font-head);font-size:var(--t-badge);letter-spacing:3px;text-transform:uppercase;color:#fff;padding:8px 20px;border-radius:6px;\">Demo 02<\u002Fdiv>\n      <h2 style=\"font-family:var(--font-head);font-size:var(--t-title);font-weight:700;color:#fff;margin:0;\">Surfacing Hidden Patterns<\u002Fh2>\n    <\u002Fdiv>\n    <div style=\"display:flex;gap:64px;flex:1;align-items:flex-start;\">\n      <div style=\"flex:1.2;display:flex;flex-direction:column;gap:28px;\">\n        <div style=\"font-family:var(--font-head);font-size:var(--t-badge);letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,0.45);\">Example prompts<\u002Fdiv>\n        <div style=\"background:#1A2540;border-radius:12px;padding:36px 40px;font-family:var(--font-mono);font-size:var(--t-code);color:#CDD6F4;display:flex;flex-direction:column;gap:22px;line-height:1.7;\">\n          <div><span style=\"color:#A6E3A1;\">›<\u002Fspan> What themes recur most across my notes from 2023–2024?<\u002Fdiv>\n          <div><span style=\"color:#A6E3A1;\">›<\u002Fspan> Trace how my thinking on [topic] evolved over time.<\u002Fdiv>\n          <div><span style=\"color:#A6E3A1;\">›<\u002Fspan> Which ideas appear in multiple separate notes?<\u002Fdiv>\n          <div><span style=\"color:#A6E3A1;\">›<\u002Fspan> What am I clearly obsessed with but haven't acted on?<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"flex:1;display:flex;flex-direction:column;gap:28px;\">\n        <div style=\"font-family:var(--font-head);font-size:var(--t-badge);letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,0.45);\">What makes this powerful<\u002Fdiv>\n        <div style=\"display:flex;flex-direction:column;gap:28px;\">\n          <div style=\"display:flex;gap:20px;align-items:flex-start;\">\n            <div style=\"width:8px;height:8px;background:var(--col-blue);border-radius:50%;flex:none;margin-top:14px;\"><\u002Fdiv>\n            <div style=\"font-family:var(--font-body);font-size:var(--t-small);color:rgba(255,255,255,0.75);line-height:1.55;\">You wrote at different times, in different contexts — Claude connects them across years<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"display:flex;gap:20px;align-items:flex-start;\">\n            <div style=\"width:8px;height:8px;background:var(--col-blue);border-radius:50%;flex:none;margin-top:14px;\"><\u002Fdiv>\n            <div style=\"font-family:var(--font-body);font-size:var(--t-small);color:rgba(255,255,255,0.75);line-height:1.55;\">Obsessions become visible — things you keep returning to without realizing it<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"display:flex;gap:20px;align-items:flex-start;\">\n            <div style=\"width:8px;height:8px;background:var(--col-blue);border-radius:50%;flex:none;margin-top:14px;\"><\u002Fdiv>\n            <div style=\"font-family:var(--font-body);font-size:var(--t-small);color:rgba(255,255,255,0.75);line-height:1.55;\">The pattern often reveals your next move better than any planning session<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <img src=\"974c5e7a-acc8-4a5e-aa9a-886612fde4ae\" style=\"position:absolute;top:28px;right:40px;height:82px;object-fit:contain;\" alt=\"Austin AI Alliance\">\n    <img src=\"fffc53f2-228b-4423-9d43-e0520f2f56ba\" style=\"position:absolute;bottom:32px;right:40px;height:46px;object-fit:contain;\" alt=\"NSF IFML\">\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ===== SLIDE 12: DEMO 3 ===== -->\n<section data-label=\"Demo 3\" data-screen-label=\"12 — Demo 3\" style=\"background:var(--col-demo);\" data-speaker-notes=\"Generate startup ideas from your real vault. Point out that
