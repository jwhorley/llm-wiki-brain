g:2px;text-transform:uppercase;color:rgba(255,255,255,0.45);\">Why this isn't generic AI<\u002Fdiv>\n        <div style=\"display:flex;flex-direction:column;gap:28px;\">\n          <div style=\"display:flex;gap:20px;align-items:flex-start;\">\n            <div style=\"width:8px;height:8px;background:var(--col-green);border-radius:50%;flex:none;margin-top:14px;\"><\u002Fdiv>\n            <div style=\"font-family:var(--font-body);font-size:var(--t-small);color:rgba(255,255,255,0.75);line-height:1.55;\">Ideas are grounded in your actual writing — not hallucinated from general training data<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"display:flex;gap:20px;align-items:flex-start;\">\n            <div style=\"width:8px;height:8px;background:var(--col-green);border-radius:50%;flex:none;margin-top:14px;\"><\u002Fdiv>\n            <div style=\"font-family:var(--font-body);font-size:var(--t-small);color:rgba(255,255,255,0.75);line-height:1.55;\">Claude can cite which notes informed each idea — full traceability back to your thinking<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"display:flex;gap:20px;align-items:flex-start;\">\n            <div style=\"width:8px;height:8px;background:var(--col-green);border-radius:50%;flex:none;margin-top:14px;\"><\u002Fdiv>\n            <div style=\"font-family:var(--font-body);font-size:var(--t-small);color:rgba(255,255,255,0.75);line-height:1.55;\">The more you write, the more tailored and precise the output becomes<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <img src=\"974c5e7a-acc8-4a5e-aa9a-886612fde4ae\" style=\"position:absolute;top:28px;right:40px;height:82px;object-fit:contain;\" alt=\"Austin AI Alliance\">\n    <img src=\"fffc53f2-228b-4423-9d43-e0520f2f56ba\" style=\"position:absolute;bottom:32px;right:40px;height:46px;object-fit:contain;\" alt=\"NSF IFML\">\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ===== SLIDE 13: DEMO 4 ===== -->\n<section data-label=\"Demo 4\" data-screen-label=\"13 — Demo 4\" style=\"background:var(--col-demo);\" data-speaker-notes=\"Show the daily review command live. Then show the cron job concept — the system runs without you touching it. This is the autopilot payoff.\">\n  <div style=\"position:relative;width:100%;height:100%;display:flex;flex-direction:column;padding:var(--pad-top) var(--pad-x) var(--pad-bot);\">\n    <div style=\"display:flex;align-items:center;gap:24px;margin-bottom:var(--gap-title);\">\n      <div style=\"background:var(--col-blue);font-family:var(--font-head);font-size:var(--t-badge);letter-spacing:3px;text-transform:uppercase;color:#fff;padding:8px 20px;border-radius:6px;\">Demo 04<\u002Fdiv>\n      <h2 style=\"font-family:var(--font-head);font-size:var(--t-title);font-weight:700;color:#fff;margin:0;\">Autonomous Agents &amp; Custom Commands<\u002Fh2>\n    <\u002Fdiv>\n    <div style=\"display:flex;gap:64px;flex:1;align-items:flex-start;\">\n      <div style=\"flex:1.2;display:flex;flex-direction:column;gap:28px;\">\n        <div style=\"font-family:var(--font-head);font-size:var(--t-badge);letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,0.45);\">Example agent commands<\u002Fdiv>\n        <div style=\"background:#1A2540;border-radius:12px;padding:36px 40px;font-family:var(--font-mono);font-size:var(--t-code);color:#CDD6F4;display:flex;flex-direction:column;gap:22px;line-height:1.7;\">\n          <div><span style=\"color:#A6E3A1;\">›<\u002Fspan> Run my daily review: surface my top 3 open threads.<\u002Fdiv>\n          <div><span style=\"color:#A6E3A1;\">›<\u002Fspan> Create a weekly digest from this week's daily notes.<\u002Fdiv>\n          <div><span style=\"color:#A6E3A1;\">›<\u002Fspan> Auto-tag all untagged notes in /Inbox by topic.<\u002Fdiv>\n          <div><span style=\"color:#A6E3A1;\">›<\u002Fspan> Archive notes older than 90 days with no backlinks.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"flex:1;display:flex;flex-direction:column;gap:28px;\">\n        <div style=\"font-family:var(--font-head);font-size:var(--t-badge);letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,0.45);\">The autopilot concept<\u002Fdiv>\n        <div style=\"display:flex;flex-direction:column;gap:28px;\">\n          <div style=\"display:flex;gap:20px;align-items:flex-start;\">\n            <div style=\"width:8px;height:8px;background:var(--col-blue);border-radius:50%;flex:none;margin-top:14px;\"><\u002Fdiv>\n            <div style=\"font-family:var(--font-body);font-size:var(--t-small);color:rgba(255,255,255,0.75);line-height:1.55;\">Define a command once, run it forever — vault maintenance on autopilot<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"display:flex;gap:20px;align-items:flex-start;\">\n            <div style=\"width:8px;height:8px;background:var(--col-blue);border-radius:50%;flex:none;margin-top:14px;\"><\u002Fdiv>\n            <div style=\"font-family:var(--font-body);font-size:var(--t-small);color:rgba(255,255,255,0.75);line-height:1.55;\">Claude can read, write, move, and tag files — full vault operations, not just queries<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"display:flex;gap:20px;align-items:flex-start;\">\n            <div style=\"width:8px;height:8px;background:var(--col-blue);border-radius:50%;flex:none;margin-top:14px;\"><\u002Fdiv>\n            <div style=\"font-family:var(--font-body);font-size:var(--t-small);color:rgba(255,255,255,0.75);line-height:1.55;\">Commands live in your vault as .md files — version-controlled and shareable<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <img src=\"974c5e7a-acc8-4a5e-aa9a-886612fde4ae\" style=\"position:absolute;top:28px;right:40px;height:82px;object-fit:contain;\" alt=\"Austin AI Alliance\">\n    <img src=\"fffc53f2-228b-4423-9d43-e0520f2f56ba\" style=\"position:absolute;bottom:32px;right:40px;height:46px;object-fit:contain;\" alt=\"NSF IFML\">\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ===== SLIDE 14: ACTIVITY 2 ===== -->\n<section data-label=\"Activity 2\" data-screen-label=\"14 — Activity 2\" style=\"background:var(--col-activity);\" data-speaker-notes=\"8 minutes. Push them to actually run the command, not just design it. The template on the right is a real starting point they can copy verbatim and test immediately.\">\n  <div style=\"position:relative;width:100%;height:100%;display:flex;flex-direction:column;padding:var(--pad-top) var(--pad-x) var(--pad-bot);\">\n    <div style=\"display:flex;align-items:center;gap:24px;margin-bottom:var(--gap-title);\">\n      <div style=\"background:var(--col-green);font-family:var(--font-head);font-size:var(--t-badge);letter-spacing:3px;text-transform:uppercase;color:#fff;padding:8px 20px;border-radius:6px;\">Activity · 8 min<\u002Fdiv>\n      <h2 style=\"font-family:var(--font-head);font-size:var(--t-title);font-weight:700;color:#fff;margin:0;\">Build Your First Agent Command<\u002Fh2>\n    <\u002Fdiv>\n    <div style=\"display:flex;gap:64px;flex:1;align-items:flex-start;\">\n      <div style=\"flex:1;display:flex;flex-direction:column;gap:24px;\">\n        <div style=\"display:flex;gap:24px;align-items:flex-start;\">\n          <div style=\"font-family:var(--font-head);font-size:38px;font-weight:700;color:var(--col-green);flex:none;width:52px;\">1<\u002Fdiv>\n          <div style=\"font-family:var(--font-body);font-size:var(--t-body);color:rgba(255,255,255,0.85);line-height:1.5;padding-top:4px;\">Think of a recurring task you do manually with your notes (weekly review, tagging, summarizing)<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:flex;gap:24px;align-items:flex-start;\">\n          <div style=\"font-family:var(--font-head);font-size:38px;font-weight:700;color:var(--col-green);flex:none;width:52px;\">2<\u002Fdiv>\n          <div style=\"font-family:var(--font-body);font-size:var(--t-body);color:rgba(255,255,255,0.85);line-height:1.5;padding-top:4px;\">Tell Claude: <span style=\"color:#A6E3A1;\">\"Create a command that does [task] automatically and save it as commands/[name].md\"<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:flex;gap:24px;align-items:flex-start;\">\n          <div style=\"font-family:var(--font-head);font-size:38px;font-weight:700;color:var(--col-green);flex:none;width:52px;\">3<\u002Fdiv>\n          <div style=\"font-family:var(--font-body);font-size:var(--t-body);color:rgba(255,255,255,0.85);line-height:1.5;padding-top:4px;\">Run it. Inspect what Claude does. Refine the prompt until it's right.<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:flex;gap:24px;align-items:flex-start;\">\n          <div style=\"font-family:var(--font-head);font-size:38px;font-weight:700;color:var(--col-green);flex:none;width:52px;\">4<\u002Fdiv>\n          <div style=\"font-family:var(--font-body);font-size:var(--t-body);color:rgba(255,255,255,0.85);line-height:1.5;padding-top:4px;\">Share what you built with the group<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"flex:1;background:rgba(255,255,255,0.05);border-radius:12px;padding:40px;border:1px solid rgba(255,255,255,0.1);\">\n        <div style=\"font-family:var(--font-head);font-size:var(--t-sub);font-weight:600;color:#fff;margin-bottom:20px;\">Starter template<\u002Fdiv>\n        <div style=\"background:#0A160A;border-radius:10px;padding:28px 32px;font-family:var(--font-mono);font-size:var(--t-code);color:#CDD6F4;line-height:1.9;\">\n          <div style=\"color:#6C7086;\"># daily-review.md<\u002Fdiv>\n          <div style=\"margin-top:12px;\">Read today's daily note and all<\u002Fdiv>\n          <div>open tasks across the vault.<\u002Fdiv>\n          <div style=\"margin-top:12px;\">Output: top 3 priorities for<\u002Fdiv>\n          <div>today based on context.<\u002Fdiv>\n          <div style=\"margin-top:12px;\">Format as a brief bullet list.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <img src=\"974c5e7a-acc8-4a5e-aa9a-886612fde4ae\" style=\"position:absolute;top:28px;right:40px;height:82px;object-fit:contain;\" alt=\"Austin AI Alliance\">\n    <img src=\"fffc53f2-228b-4423-9d43-e0520f2f56ba\" style=\"position:absolute;bottom:32px;right:40px;height:46px;object-fit:contain;\" alt=\"NSF IFML\">\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ===== SLIDE 15: ADVANCED WORKFLOWS ===== -->\n<section data-label=\"Advanced Workflows\" data-screen-label=\"15 — Advanced Workflows\" style=\"background:var(--col-bg);\" data-speaker-notes=\"Mention these briefly and let people self-select. The scheduled digest is the most popular among daily users. Idea evolution tracing is the most intellectually exciting.\">\n  <div style=\"position:relative;width:100%;height:100%;display:flex;flex-direction:column;padding:var(--pad-top) var(--pad-x) var(--pad-bot);\">\n    <h2 style=\"font-family:var(--font-head);font-size:var(--t-title);font-weight:700;color:var(--col-text);margin:0 0 var(--gap-title);\">Advanced Workflows<\u002Fh2>\n    <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:28px;flex:1;\">\n      <div style=\"background:var(--col-surface);border-radius:12px;padding:36px;display:flex;flex-direction:column;gap:16px;\">\n        <div style=\"font-family:var(--font-head);font-size:var(--t-sub);font-weight:700;color:var(--col-text);\">Idea Evolution Tracing<\u002Fdiv>\n        <div style=\"font-family:var(--font-body);font-size:var(--t-small);color:var(--col-muted);line-height:1.55;\">Trace how an idea first appeared in your vault, evolved across notes over months, and what it eventually became.<\u002Fdiv>\n        <div style=\"background:#1E2030;border-radius:8px;padding:16px 20px;font-family:var(--font-mono);font-size:24px;color:#A6E3A1;line-height:1.6;\">› Trace my thinking on [topic] from first mention to now.<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"background:var(--col-surface);border-radius:12px;padding:36px;display:flex;flex-direction:column;gap:16px;\">\n        <div style=\"font-family:var(--font-head);font-size:var(--t-sub);font-weight:700;color:var(--col-text);\">Context-Aware Writing<\u002Fdiv>\n        <div style=\"font-family:var(--font-body);font-size:var(--t-small);color:var(--col-muted);line-height:1.55;\">Draft posts, emails, and proposals in your voice — trained on how you actually write, not a generic template.<\u002Fdiv>\n        <div style=\"background:#1E2030;border-radius:8px;padding:16px 20px;font-family:var(--font-mono);font-size:24px;color:#A6E3A1;line-height:1.6;\">› Write a post about [topic] in my voice, from my notes.<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"background:var(--col-surface);border-radius:12px;padding:36px;display:flex;flex-direction:column;gap:16px;\">\n        <div style=\"font-family:var(--font-head);font-size:var(--t-sub);font-weight:700;color:var(--col-text);\">Project Gap Analysis<\u002Fdiv>\n        <div style=\"font-family:var(--font-body);font-size:var(--t-small);color:var(--col-muted);line-height:1.55;\">Claude reads your project notes and flags what's missing: undone tasks, unresolved decisions, stale threads.<\u002Fdiv>\n        <div style=\"background:#1E2030;border-radius:8px;padding:16px 20px;font-family:var(--font-mono);font-size:24px;color:#A6E3A1;line-height:1.6;\">› Audit my Projects/ folder. What's stalled or missing?<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"background:var(--col-surface);border-radius:12px;padding:36px;display:flex;flex-direction:column;gap:16px;\">\n        <div style=\"font-family:var(--font-head);font-size:var(--t-sub);font-weight:700;color:var(--col-text);\">Scheduled Digests<\u002Fdiv>\n        <div style=\"font-family:var(--font-body);font-size:var(--t-small);color:var(--col-muted);line-height:1.55;\">Set a cron job to run your digest command daily. Claude summarizes automatically — no manual effort required.<\u002Fdiv>\n        <div style=\"background:#1E2030;border-radius:8px;padding:16px 20px;font-family:var(--font-mono);font-size:24px;color:#A6E3A1;line-height:1.6;\">0 18 * * * cd ~/Vault &amp;&amp; claude --print \"run daily-digest\"<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <img src=\"974c5e7a-acc8-4a5e-aa9a-886612fde4ae\" style=\"position:absolute;top:28px;right:40px;height:82px;object-fit:contain;\" alt=\"Austin AI Alliance\">\n    <img src=\"fffc53f2-228b-4423-9d43-e0520f2f56ba\" style=\"position:absolute;bottom:32px;right:40px;height:46px;object-fit:contain;\" alt=\"NSF IFML\">\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ===== SLIDE 16: WRITING IS THE FUEL ===== -->\n<section data-label=\"Writing Is the Fuel\" data-screen-label=\"16 — Writing Is the Fuel\" style=\"background:linear-gradient(to right, var(--col-blue) 0%, var(--col-blue) 45%, #b0badf 72%, #ffffff 100%);\" data-speaker-notes=\"The key closing insight: this system compounds. It's not about the tool — it's about the habit. Your writing is the asset. Claude is the engine. The more you write, the smarter your system gets.\">\n  <div style=\"position:relative;width:100%;height:100%;display:flex;flex-direction:column;justify-content:center;padding:0 var(--pad-x);\">\n    <div style=\"position:absolute;inset:0;background-image:radial-gradient(circle,rgba(255,255,255,0.08) 1.5px,transparent 1.5px);background-size:36px 36px;pointer-events:none;\"><\u002Fdiv>\n    <div style=\"z-index:1;max-width:1100px;\">\n      <div style=\"font-family:var(--font-body);font-size:var(--t-badge);letter-spacing:3px;text-transform:uppercase;color:rgba(255,255,255,0.5);margin-bottom:40px;\">The bigger picture<\u002Fdiv>\n      <div style=\"font-family:var(--font-head);font-size:80px;font-weight:700;color:#fff;line-height:1.1;\">Your writing<br>is the fuel.<\u002Fdiv>\n      <div style=\"width:80px;height:4px;background:rgba(255,255,255,0.4);margin:52px 0 44px;\"><\u002Fdiv>\n      <div style=\"font-family:var(--font-body);font-size:var(--t-sub);color:rgba(255,255,255,0.8);line-height:1.6;max-width:860px;\">The more you write, the more powerful this becomes. Every note you take today is fuel for Claude tomorrow. The loop compounds: write → query → insight → write more.<\u002Fdiv>\n      <div style=\"margin-top:60px;display:flex;gap:64px;\">\n        <div style=\"display:flex;flex-direction:column;gap:10px;\">\n          <div style=\"font-family:var(--font-head);font-size:var(--t-sub);font-weight:700;color:#fff;\">Write consistently<\u002Fdiv>\n          <div style=\"font-family:var(--font-body);font-size:var(--t-small);color:rgba(255,255,255,0.6);\">Quality matters less than frequency<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:flex;flex-direction:column;gap:10px;\">\n          <div style=\"font-family:var(--font-head);font-size:var(--t-sub);font-weight:700;color:#fff;\">Link freely<\u002Fdiv>\n          <div style=\"font-family:var(--font-body);font-size:var(--t-small);color:rgba(255,255,255,0.6);\">[[Wiki-links]] build the graph Claude navigates<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:flex;flex-direction:column;gap:10px;\">\n          <div style=\"font-family:var(--font-head);font-size:var(--t-sub);font-weight:700;color:#fff;\">Trust the system<\u002Fdiv>\n          <div style=\"font-family:var(--font-body);font-size:var(--t-small);color:rgba(255,255,255,0.6);\">Let Claude surface what you can't see yet<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <img src=\"974c5e7a-acc8-4a5e-aa9a-886612fde4ae\" style=\"position:absolute;top:28px;right:40px;height:82px;object-fit:contain;\" alt=\"Austin AI Alliance\">\n    <img src=\"fffc53f2-228b-4423-9d43-e0520f2f56ba\" style=\"position:absolute;bottom:32px;right:40px;height:46px;object-fit:contain;\" alt=\"NSF IFML\">\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ===== SLIDE 17: RESOURCES ===== -->\n<section data-label=\"Resources\" data-screen-label=\"17 — Resources\" style=\"background:var(--col-surface);\">\n  <div style=\"position:relative;width:100%;height:100%;display:flex;flex-direction:column;padding:var(--pad-top) var(--pad-x) var(--pad-bot);\">\n    <h2 style=\"font-family:var(--font-head);font-size:var(--t-title);font-weight:700;color:var(--col-text);margin:0 0 var(--gap-title);\">Resources &amp; Next Steps<\u002Fh2>\n    <div style=\"display:flex;gap:64px;flex:1;align-items:flex-start;\">\n      <div style=\"flex:1;display:flex;flex-direction:column;gap:36px;\">\n        <div>\n          <div style=\"font-family:var(--font-head);font-size:var(--t-sub);font-weight:600;color:var(--col-text);margin-bottom:20px;\">Get the tools<\u002Fdiv>\n          <div style=\"display:flex;flex-direction:column;gap:20px;\">\n            <div>\n              <div style=\"font-family:var(--font-head);font-size:var(--t-small);font-weight:600;color:var(--col-blue);\">Obsidian<\u002Fdiv>\n              <div style=\"font-family:var(--font-mono);font-size:var(--t-badge);color:var(--col-muted);margin-top:4px;\">obsidian.md — free for personal use<\u002Fdiv>\n            <\u002Fdiv>\n            <div>\n              <div style=\"font-family:var(--font-head);font-size:var(--t-small);font-weight:600;color:var(--col-blue);\">Claude Code<\u002Fdiv>\n              <div style=\"font-family:var(--font-mono);font-size:var(--t-badge);color:var(--col-muted);margin-top:4px;\">claude.ai/code — requires Claude subscription<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div>\n          <div style=\"font-family:var(--font-head);font-size:var(--t-sub);font-weight:600;color:var(--col-text);margin-bottom:16px;\">This workshop on GitHub<\u002Fdiv>\n          <div style=\"font-family:var(--font-mono);font-size:28px;color:var(--col-blue);\">github.com/jpwhorley/llm-wiki-brain<\u002Fdiv>\n          <div style=\"font-family:var(--font-body);font-size:var(--t-small);color:var(--col-muted);margin-top:8px;\">Slides, example vault structure, starter commands<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"flex:1;display:flex;flex-direction:column;gap:36px;\">\n        <div>\n          <div style=\"font-family:var(--font-head);font-size:var(--t-sub);font-weight:600;color:var(--col-text);margin-bottom:20px;\">Further reading<\u002Fdiv>\n          <div style=\"display:flex;flex-direction:column;gap:20px;\">\n            <div>\n              <div style=\"font-family:var(--font-head);font-size:var(--t-small);font-weight:600;color:var(--col-text);\">How to Take Smart Notes — Sönke Ahrens<\u002Fdiv>\n              <div style=\"font-family:var(--font-body);font-size:var(--t-small);color:var(--col-muted);margin-top:4px;\">The Zettelkasten method that inspired Obsidian<\u002Fdiv>\n            <\u002Fdiv>\n            <div>\n              <div style=\"font-family:var(--font-head);font-size:var(--t-small);font-weight:600;color:var(--col-text);\">Building a Second Brain — Tiago Forte<\u002Fdiv>\n              <div style=\"font-family:var(--font-body);font-size:var(--t-small);color:var(--col-muted);margin-top:4px;\">The PARA system used in this workshop<\u002Fdiv>\n            <\u002Fdiv>\n            <div>\n              <div style=\"font-family:var(--font-head);font-size:var(--t-small);font-weight:600;color:var(--col-text);\">Claude Code Documentation<\u002Fdiv>\n              <div style=\"font-family:var(--font-mono);font-size:var(--t-badge);color:var(--col-muted);margin-top:4px;\">docs.anthropic.com/en/docs/claude-code<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"background:var(--col-bg);border-radius:12px;padding:32px 36px;\">\n          <div style=\"font-family:var(--font-head);font-size:var(--t-small);font-weight:600;color:var(--col-text);margin-bottom:12px;\">J P. Whorley<\u002Fdiv>\n          <div style=\"font-family:var(--font-body);font-size:var(--t-small);color:var(--col-muted);line-height:1.7;\">Asst. Director Operations, ML Lab @ UT Austin<br>Institute for Foundations of Machine Learning (IFML)<br>ifml.utexas.edu<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <img src=\"974c5e7a-acc8-4a5e-aa9a-886612fde4ae\" style=\"position:absolute;top:28px;right:40px;height:82px;object-fit:contain;\" alt=\"Austin AI Alliance\">\n    <img src=\"fffc53f2-228b-4423-9d43-e0520f2f56ba\" style=\"position:absolute;bottom:32px;right:40px;height:46px;object-fit:contain;\" alt=\"NSF IFML\">\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ===== SLIDE 18: Q&A ===== -->\n<section data-label=\"Q&amp;A\" data-screen-label=\"18 — Q&amp;A\" style=\"background:var(--col-bg);\">\n  <div style=\"position:relative;width:100%;height:100%;display:flex;flex-direction:column;justify-content:center;padding:0 var(--pad-x);\">\n    <div style=\"position:absolute;inset:0;background-image:radial-gradient(circle,rgba(98,114,190,0.1) 1.5px,transparent 1.5px);background-size:36px 36px;pointer-events:none;\"><\u002Fdiv>\n    <div style=\"z-index:1;\">\n      <div style=\"font-family:var(--font-body);font-size:var(--t-badge);letter-spacing:3px;text-transform:uppercase;color:var(--col-muted);margin-bottom:40px;\">Thank you<\u002Fdiv>\n      <div style=\"font-family:var(--font-head);font-size:var(--t-hero);font-weight:700;color:var(--col-text);line-height:1.05;\">Questions?<\u002Fdiv>\n      <div style=\"width:100px;height:4px;background:var(--col-blue);margin:52px 0 48px;\"><\u002Fdiv>\n      <div style=\"display:flex;gap:80px;\">\n        <div style=\"display:flex;flex-direction:column;gap:10px;\">\n          <div style=\"font-family:var(--font-head);font-size:var(--t-small);font-weight:600;color:var(--col-text);\">J P. Whorley<\u002Fdiv>\n          <div style=\"font-family:var(--font-body);font-size:28px;color:var(--col-muted);line-height:1.6;\">Asst. Director Operations<br>Machine Learning Lab @ UT Austin<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:flex;flex-direction:column;gap:10px;\">\n          <div style=\"font-family:var(--font-head);font-size:var(--t-small);font-weight:600;color:var(--col-text);\">Workshop materials<\u002Fdiv>\n          <div style=\"font-family:var(--font-mono);font-size:28px;color:var(--col-blue);margin-top:4px;\">github.com/jpwhorley/llm-wiki-brain<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <img src=\"974c5e7a-acc8-4a5e-aa9a-886612fde4ae\" style=\"position:absolute;top:28px;right:40px;height:82px;object-fit:contain;\" alt=\"Austin AI Alliance\">\n    <img src=\"fffc53f2-228b-4423-9d43-e0520f2f56ba\" style=\"position:absolute;bottom:32px;right:40px;height:46px;object-fit:contain;\" alt=\"NSF IFML\">\n  <\u002Fdiv>\n<\u002Fsection>\n\n<\u002Fx-import>\n<\u002Fx-dc>\n\n\n<\u002Fbody><\u002Fhtml>"},"entry":"LLM Wiki Brain Export"}
